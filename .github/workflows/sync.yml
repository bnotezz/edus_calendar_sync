name: School Calendar Sync
on:
  schedule:
    - cron: "0 4 * * *"  # Щодня о 04:00
    - cron: "0 5 * * 0"  # Щонеділі о 05:00
  workflow_dispatch:      # Ручний запуск
    inputs:
      mode:
        description: 'Оберіть режим синхронізації'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - holidays

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install
        run: pip install -r requirements.txt
        
      - name: Execute
        env:
          SCHOOL_HOST: ${{ secrets.SCHOOL_HOST }}
          SCHOOL_TOKEN: ${{ secrets.SCHOOL_TOKEN }}
          SCHOOL_USER_UUID: ${{ secrets.SCHOOL_USER_UUID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Логіка вибору режиму: пріоритет у ручного вибору, потім розклад
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" == "0 5 * * 0" ]; then
              MODE="holidays"
            else
              MODE="daily"
            fi
          fi
          echo "🚀 Запуск у режимі: $MODE"
          python sync.py --mode $MODE